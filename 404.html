<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>404 — منصة التوفيق التعليمية</title>
  <link rel="icon" type="image/png" href="https://omartamer.netlify.app/صورة زعيم البرمجة.png"/>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
    
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;font-family:"Cairo",sans-serif;}
    body{display:flex;align-items:center;justify-content:center;color:white;overflow:hidden;}

    /* فيديو خلفية احترافي ومناسب للمنصات التعليمية */
    #bgVideo{
      position:fixed;
      top:0;left:0;width:100%;height:100%;
      object-fit:cover;
      z-index:-1;
    }

    .overlay{
      background:rgba(13, 72, 161, 0.65); /* تم تعديل اللون ليتناسق مع هوية منصتك الزرقاء */
      position:fixed;top:0;left:0;width:100%;height:100%;
      z-index:0;
    }

    .container{
      position:relative;
      z-index:1;
      text-align:center;
      padding:25px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .logo{
      width:100px;height:100px;border-radius:50%;margin-bottom:15px;
      border:3px solid #fff;box-shadow:0 0 20px rgba(0,0,0,0.4);
      object-fit: cover;
    }

    h1{
      font-size:38px;font-weight: 900;margin-bottom:10px;text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    p{
      font-size:16px;margin-bottom:25px;opacity:0.95;line-height: 1.6;
    }
    #path {
      background: rgba(255, 255, 255, 0.2);
      padding: 2px 8px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 14px;
      word-break: break-all;
    }

    /* أزرار متناسقة مع ألوان المنصة الأساسية */
    .buttons-group {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn{
      display:inline-block;
      padding:12px 20px;
      border-radius:12px;
      font-weight:700;
      text-decoration:none;
      color:#fff;
      font-size: 13px;
      transition:0.3s-all;
      flex: 1;
    }
    .btn-main {
      background:#0d48a1; /* اللون الأزرق المعتمد للمنصة */
      border: 1px solid #0d48a1;
      box-shadow:0 5px 15px rgba(13, 72, 161, 0.4);
    }
    .btn-main:hover{background:#0b3c8f}
    
    .btn-secondary {
      background:transparent;
      border: 2px solid #fff;
    }
    .btn-secondary:hover{background:rgba(255,255,255,0.15)}

    .small{margin-top:25px;font-size:12px;opacity:0.7;font-weight: bold;}
  </style>
</head>
<body>

  <video autoplay muted loop playsinline id="bgVideo">
    <source src="https://videos.pexels.com/video-files/856185/856185-hd_1920_1080_30fps.mp4" type="video/mp4">
  </video>
  
  <div class="overlay"></div>

  <div class="container">
    <img src="https://omartamer.netlify.app/صورة زعيم البرمجة.png" alt="شعار منصة التوفيق" class="logo"/>
    
    <h1>عذراً، خطأ 404</h1>
    <p>يبدو أن الرابط <span id="path"></span> غير موجود أو تم نقله لمكان آخر داخل المنصة.<br> 
    بالتوفيق والنجاح دائماً العُقبي لكم ✨</p>
    
    <div class="buttons-group">
        <a href="/" class="btn btn-main"><i class="fa-solid fa-house"></i> رئيسية المنصة </a>
        <a href="https://omartamer.netlify.app/contact" target="_blank" class="btn btn-secondary"> الدعم الفني </a>
    </div>

    <div class="small">© 2026 منصة التوفيق التعليمية | برمجة وتطوير زعيم البرمجة</div>
  </div>

  <script>
    // عرض المسار الحالي الذي دخله الطالب بالخطأ برمجياً
    document.getElementById("path").textContent = decodeURIComponent(location.pathname);
  </script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
